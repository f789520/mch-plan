<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>美金豪 2F 空間規劃工具</title>
<style>body{margin:0;padding:12px;background:#f2f1ec;font-family:system-ui,"Noto Sans TC",sans-serif}</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>美金豪 2F 空間規劃</h1>
    <p class="hint">點左側物件加入平面圖，拖曳移動。選取後拖四角改大小、拖上方圓點旋轉，或在右上面板輸入精確數字。</p>

    <div class="grp">
      <button class="tab on" data-tab="items">物件</button>
      <button class="tab" data-tab="zones">區域</button>
      <button class="tab" data-tab="view">檢視</button>
      <button class="tab" data-tab="saves">存檔</button>
      <button class="tab" data-tab="share">共用</button>
    </div>

    <div class="pane" id="pane-items"></div>

    <div class="pane hide" id="pane-zones">
      <p class="hint">點一下加入區域色塊，可拖曳與縮放，自動算坪數。</p>
      <div id="zonelist"></div>
    </div>

    <div class="pane hide" id="pane-view">
      <label><input type="checkbox" id="ck-dims"> 顯示尺寸引線</label>
      <label><input type="checkbox" id="ck-detail" checked> 顯示門窗樓梯與標註數字</label>
      <label><input type="checkbox" id="ck-grid" checked> 顯示 1m 格線</label>
      <label><input type="checkbox" id="ck-label" checked> 顯示物件名稱</label>
      <label><input type="checkbox" id="ck-snap" checked> 吸附 10cm 格點</label>
      <div class="row">
        <button id="btn-export">匯出 JSON</button>
        <button id="btn-import">匯入 JSON</button>
      </div>
      <div class="row">
        <button id="btn-png">存成 SVG 圖</button>
        <button id="btn-print">列印</button>
      </div>
      <button id="btn-clear" class="danger">清空全部</button>
      <input type="file" id="file" accept=".json" hidden>
    </div>

    <div class="pane hide" id="pane-saves">
      <p class="hint">把目前整張圖存成一個版本，之後隨時載回。版本存在這台電腦；連線共用時全部人共享同一份版本清單。</p>
      <div class="row">
        <input type="text" id="sv-name" placeholder="版本名稱，例如 方案A 三區">
        <button id="sv-add">存檔</button>
      </div>
      <div id="sv-list"></div>
    </div>

    <div class="pane hide" id="pane-share">
      <p class="hint">多人同時編輯同一張圖。需要一組 Firebase 設定（Google 雲端，免費）。</p>
      <label class="stack">房間名稱
        <input type="text" id="fb-room" placeholder="例如 mch-2f-a7k3">
      </label>
      <label class="stack">Firebase 設定 JSON
        <textarea id="fb-cfg" rows="5" placeholder='{"apiKey":"...","databaseURL":"...","projectId":"..."}'></textarea>
      </label>
      <div class="row">
        <button id="fb-go">連線共用</button>
        <button id="fb-off">離線</button>
      </div>
      <div id="fb-stat" class="fbstat">目前：本機模式（只存在這台電腦）</div>
      <button id="fb-link">複製共用連結</button>
      <p class="hint" style="margin-top:10px">連線後，任何人開同一個連結、同一個房間，就會即時看到彼此的變更。</p>
    </div>
  </aside>

  <main id="stage">
    <div id="topbar">
      <span id="stat">物件 0 個</span>
      <span class="sep"></span>
      <span id="sel">未選取</span>
      <span class="sep"></span>
      <button id="m-btn" title="量測長度與面積">尺</button>
      <span id="m-out"></span>
      <span class="muted">1單位=4.955cm</span>
    </div>
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="props" class="hide">
      <div class="prow"><label>名稱</label><input type="text" id="p-name" placeholder="物件名稱"></div>
      <div class="prow"><label>寬 cm</label><input type="number" id="p-w" step="5"></div>
      <div class="prow"><label>深 cm</label><input type="number" id="p-h" step="5"></div>
      <div class="prow"><label>角度</label><input type="number" id="p-r" step="15"></div>
      <div class="prow"><button id="p-rot">旋轉 90°</button><button id="p-dup">複製</button></div>
      <div class="prow" id="p-area"></div>
      <button id="p-del">刪除這個物件</button>
    </div>
    <div id="zprops" class="hide">
      <div class="prow"><label>名稱</label><input type="text" id="z-name" placeholder="區域名稱"></div>
      <div class="prow"><label>顏色</label><span id="z-colors"></span></div>
      <div class="prow" id="z-area"></div>
      <p class="zhint">拖白色方點改形狀，拖邊上小圓點多一個角，雙擊白色方點刪掉那個角。</p>
      <button id="z-del">刪除這個區域</button>
    </div>
  </main>
</div>

function migrateState() {

  const walls = PLAN.walls.map((w, i) => {
    if (hidden.includes('w' + i)) return null;
    const o = off['w' + i] || [0, 0];

let mOn = false, mPts = [], mDone = false;
function fmtM(cm) { return (cm / 100).toFixed(2) + 'm'; }
function drawMeasure() {
  lMeas.innerHTML = '';
  if (!mOn || !mPts.length) { updateMOut(); return; }
  const P = mPts.map(p => [c2u(p[0]), c2u(p[1])]);
  if (P.length > 1) {
    el('polyline', { points: P.map(p => p.join(',')).join(' '), fill: 'none', stroke: '#1D9E75', 'stroke-width': 1, 'stroke-dasharray': '4 2' }, lMeas);
  }
  if (mDone && P.length >= 3) {
    el('polygon', { points: P.map(p => p.join(',')).join(' '), fill: '#1D9E75', 'fill-opacity': .12, stroke: '#1D9E75', 'stroke-width': 1 }, lMeas);
  }
  P.forEach(p => el('circle', { cx: p[0], cy: p[1], r: 1.6, fill: '#1D9E75' }, lMeas));
  for (let i = 0; i + 1 < mPts.length; i++) {
    const L = Math.hypot(mPts[i + 1][0] - mPts[i][0], mPts[i + 1][1] - mPts[i][1]);
    const t = el('text', {
      x: (P[i][0] + P[i + 1][0]) / 2, y: (P[i][1] + P[i + 1][1]) / 2 - 2,
      'text-anchor': 'middle', 'font-size': 6, fill: '#04342C',
      style: 'paint-order:stroke;stroke:#fff;stroke-width:2px;pointer-events:none;user-select:none'
    }, lMeas);
    t.textContent = fmtM(L);
  }
  if (mDone && mPts.length >= 3) {
    const cx = P.reduce((a, p) => a + p[0], 0) / P.length;
    const cy = P.reduce((a, p) => a + p[1], 0) / P.length;
    const t = el('text', {
      x: cx, y: cy, 'text-anchor': 'middle', 'font-size': 7, 'font-weight': 500, fill: '#04342C',
      style: 'paint-order:stroke;stroke:#fff;stroke-width:2.5px;pointer-events:none;user-select:none'
    }, lMeas);
    t.textContent = polyPing(mPts) + ' 坪';
    const t2 = el('text', {
      x: cx, y: cy + 8, 'text-anchor': 'middle', 'font-size': 5.5, fill: '#0F6E56',
      style: 'paint-order:stroke;stroke:#fff;stroke-width:2px;pointer-events:none;user-select:none'
    }, lMeas);
    let s = 0;
    for (let i = 0; i < mPts.length; i++) {
      const [x1, y1] = mPts[i], [x2, y2] = mPts[(i + 1) % mPts.length];

function updateMOut() {
  const n = document.getElementById('m-out');

  let s = 0;
  for (let i = 0; i < pts.length; i++) {
    const [x1, y1] = pts[i], [x2, y2] = pts[(i + 1) % pts.length];
    s += x1 * y2 - x2 * y1;
  }
  return (Math.abs(s) / 2 / PING).toFixed(1);
}

function render() {
  migrateState();
  lZone.innerHTML = '';
  lItem.innerHTML = '';
  lErase.innerHTML = '';
  const showLabel = document.getElementById('ck-label').checked;

  lZTop.innerHTML = '';
  state.zones.forEach(z => {
    const pts = zonePts(z);
    const g = el('g', { class: 'zone', 'data-id': z.id }, lZone);
    el('polygon', {
      points: pts.map(pt => c2u(pt[0]) + ',' + c2u(pt[1])).join(' '),
      fill: z.fill, 'fill-opacity': .45,
      stroke: zoneSel === z.id ? '#1c1c1a' : z.stroke,
      'stroke-width': zoneSel === z.id ? 1 : .6,
      'stroke-dasharray': z.risk ? '4 3' : 'none', style: 'cursor:move'
    }, g);
    const cx = pts.reduce((a, pt) => a + pt[0], 0) / pts.length;
    const cy = pts.reduce((a, pt) => a + pt[1], 0) / pts.length;
    const t = el('text', {
      x: c2u(cx), y: c2u(cy), 'text-anchor': 'middle',
      fill: z.stroke, 'font-size': 7, 'font-weight': 500, style: 'pointer-events:none;user-select:none'
    }, lZTop);
    t.textContent = z.name;
    const a = el('text', {
      x: c2u(cx), y: c2u(cy) + 8, 'text-anchor': 'middle',
      fill: z.stroke, 'font-size': 5.5, style: 'pointer-events:none;user-select:none'
    }, lZTop);
    a.textContent = polyPing(pts) + ' 坪';
    const mx = Math.max(...pts.map(pt => pt[0])), my = Math.min(...pts.map(pt => pt[1]));
    const xg = el('g', { class: 'zx', 'data-id': z.id, style: 'cursor:pointer' }, lZTop);
    el('circle', { cx: c2u(mx) - 4, cy: c2u(my) + 4, r: 3.4, fill: '#fff', stroke: z.stroke, 'stroke-width': .5 }, xg);
    const xt = el('text', {
      x: c2u(mx) - 4, y: c2u(my) + 5.8, 'text-anchor': 'middle',
      'font-size': 5, fill: z.stroke, style: 'pointer-events:none;user-select:none'
    }, xg);
    xt.textContent = '✕';
    if (zoneSel === z.id) {
      pts.forEach((pt, i) => {
        const nx = pts[(i + 1) % pts.length];
        el('circle', {
          cx: c2u((pt[0] + nx[0]) / 2), cy: c2u((pt[1] + nx[1]) / 2), r: 2.2,
          fill: z.stroke, 'fill-opacity': .55, class: 'zm', 'data-id': z.id, 'data-i': i,
          style: 'cursor:copy'
        }, lZTop);
      });
      pts.forEach((pt, i) => {
        el('rect', {
          x: c2u(pt[0]) - 2.4, y: c2u(pt[1]) - 2.4, width: 4.8, height: 4.8,
          fill: '#fff', stroke: '#1c1c1a', 'stroke-width': .8, rx: .6,
          class: 'zv', 'data-id': z.id, 'data-i': i, style: 'cursor:move'
        }, lZTop);
      });
    }
  });

  state.items.forEach(it => {
    const g = el('g', {
      class: 'item', 'data-id': it.id,
      transform: `translate(${c2u(it.x)} ${c2u(it.y)}) rotate(${it.r})`,
      style: 'cursor:move'
    }, it.k === 'erase' ? lErase : lItem);
    const w = c2u(it.w), h = c2u(it.h);
    if (it.k === 'wall') {
      el('rect', {
        x: -w / 2, y: -h / 2, width: w, height: h,
        fill: '#8d3b2e', 'fill-opacity': .95,
        stroke: sel === it.id ? '#1c1c1a' : '#6d2d22',
        'stroke-width': sel === it.id ? 1.1 : .4
      }, g);
    } else if (it.k === 'erase') {
      el('rect', {
        x: -w / 2, y: -h / 2, width: w, height: h,
        fill: '#ffffff',
        stroke: sel === it.id ? '#1c1c1a' : '#e3e1d9',
        'stroke-width': sel === it.id ? 1.1 : .5,
        'stroke-dasharray': sel === it.id ? 'none' : '3 2'
      }, g);
    } else {
      el('rect', {
        x: -w / 2, y: -h / 2, width: w, height: h,
        fill: it.color, 'fill-opacity': sel === it.id ? .55 : .32,
        stroke: sel === it.id ? '#1c1c1a' : it.color,
        'stroke-width': sel === it.id ? 1.1 : .7, rx: 1
      }, g);
      el('line', { x1: 0, y1: -h / 2, x2: 0, y2: -h / 2 + Math.min(h * .3, 4), stroke: it.color, 'stroke-width': .8 }, g);
    }
    if (showLabel && w > 8 && (!it.k || sel === it.id)) {
      const t = el('text', {
        x: 0, y: 1.6, 'text-anchor': 'middle', 'font-size': Math.min(4.6, w / 5.5),
        fill: '#333', style: 'pointer-events:none;user-select:none'
      }, g);
      t.textContent = it.name;
    }
    if (sel === it.id) {
      [[-1, -1, 'nwse'], [1, -1, 'nesw'], [1, 1, 'nwse'], [-1, 1, 'nesw']].forEach(([sx, sy, cur]) => {
        el('rect', {
          x: sx * w / 2 - 2, y: sy * h / 2 - 2, width: 4, height: 4,
          fill: '#fff', stroke: '#1c1c1a', 'stroke-width': .7, rx: .6,
          class: 'rh', 'data-id': it.id, 'data-sx': sx, 'data-sy': sy,
          style: `cursor:${cur}-resize`
        }, g);
      });
      el('line', { x1: 0, y1: -h / 2, x2: 0, y2: -h / 2 - 9, stroke: '#1c1c1a', 'stroke-width': .5 }, g);
      el('circle', {
        cx: 0, cy: -h / 2 - 11, r: 2.6, fill: '#fff', stroke: '#1c1c1a', 'stroke-width': .7,
        class: 'rot', 'data-id': it.id, style: 'cursor:grab'
      }, g);
    }
  });

  document.getElementById('stat').textContent = `物件 ${state.items.length} 個 · 區域 ${state.zones.length} 塊`;
  const s = state.items.find(i => i.id === sel);
  document.getElementById('sel').textContent = s ? `已選：${s.name}` : '未選取';
  save();
}

function addItem(name, w, h, color, kind) {
  const vb = svg.viewBox.baseVal;
  const it = {
    id: state.seq++, name, w, h, r: 0, color, k: kind || '',
    x: u2c(vb.x + vb.width / 2) + (state.items.length % 5) * 20,
    y: u2c(vb.y + vb.height / 2) + (state.items.length % 5) * 20
  };
  state.items.push(it);
  sel = it.id;
  render(); showProps();
}

function addZone(name, fill, stroke) {
  const vb = svg.viewBox.baseVal;
  const x = u2c(vb.x + 60), y = u2c(vb.y + 60);
  const z = {
    id: 'z' + state.seq++, name, fill, stroke,
    risk: name.indexOf('風險') === 0,
    pts: [[x, y], [x + 500, y], [x + 500, y + 400], [x, y + 400]]
  };
  state.zones.push(z);
  zoneSel = z.id; sel = null; hideProps();
  render(); showZProps();
}

function pt(e) {
  const p = svg.createSVGPoint();
  p.x = e.clientX; p.y = e.clientY;
  const m = svg.getScreenCTM().inverse();
  const q = p.matrixTransform(m);
  return { x: u2c(q.x), y: u2c(q.y) };
}

let drag = null;
svg.addEventListener('dblclick', e => {
  if (mOn) {
    while (mPts.length >= 2) {
      const a = mPts[mPts.length - 1], b = mPts[mPts.length - 2];
      if (Math.hypot(a[0] - b[0], a[1] - b[1]) < 5) mPts.pop(); else break;
    }
    if (mPts.length >= 3) { mDone = true; drawMeasure(); }
    return;
  }
  const zv = e.target.closest('.zv');
  if (!zv) return;
  const z = state.zones.find(v => v.id === zv.dataset.id);
  if (!z) return;
  const pts = zonePts(z);
  if (pts.length <= 3) return;
  pts.splice(+zv.dataset.i, 1);
  render(); showZProps();
});

svg.addEventListener('pointerdown', e => {
  const zx = e.target.closest('.zx');
  if (zx) {
    state.zones = state.zones.filter(v => v.id !== zx.dataset.id);
    if (zoneSel === zx.dataset.id) { zoneSel = null; hideZProps(); }
    render();
    return;
  }
  if (mOn) {
    const p = pt(e);
    if (mDone) { mPts = []; mDone = false; }
    const snapM = document.getElementById('ck-snap').checked ? 10 : 1;
    mPts.push([Math.round(p.x / snapM) * snapM, Math.round(p.y / snapM) * snapM]);
    drawMeasure();
    return;
  }
  const rh = e.target.closest('.rh');
  const rot = e.target.closest('.rot');
  const zv = e.target.closest('.zv');
  const zm = e.target.closest('.zm');
  const zg = e.target.closest('.zone');
  const ig = e.target.closest('.item');
  const p = pt(e);
  if (zv || zm) {
    const z = state.zones.find(v => v.id === (zv || zm).dataset.id);
    const pts = zonePts(z);
    let i = +(zv || zm).dataset.i;
    if (zm) {
      const nx = pts[(i + 1) % pts.length];
      pts.splice(i + 1, 0, [(pts[i][0] + nx[0]) / 2, (pts[i][1] + nx[1]) / 2]);
      i = i + 1;
    }
    drag = { t: 'zv', z, i };
    svg.setPointerCapture(e.pointerId);
    svg.classList.add('drag');
    render();
    return;
  }
  if (rh) {
    const it = state.items.find(v => v.id === +rh.dataset.id);
    drag = { t: 'ir', it };
  } else if (rot) {
    const it = state.items.find(v => v.id === +rot.dataset.id);
    drag = { t: 'irot', it };
  } else if (ig) {
    const it = state.items.find(v => v.id === +ig.dataset.id);
    sel = it.id; zoneSel = null; hideZProps();
    drag = { t: 'i', it, dx: p.x - it.x, dy: p.y - it.y };
    render(); showProps();
  } else if (zg) {
    const z = state.zones.find(v => v.id === zg.dataset.id);
    zoneSel = z.id; sel = null; hideProps();
    drag = { t: 'z', z, start: zonePts(z).map(pt => pt.slice()), px: p.x, py: p.y };
    render(); showZProps();
  } else {
    sel = null; zoneSel = null; hideZProps();
    drag = { t: 'pan', sx: e.clientX, sy: e.clientY, vb: svg.getAttribute('viewBox').split(' ').map(Number) };
    render(); hideProps();
  }
  svg.setPointerCapture(e.pointerId);
  svg.classList.add('drag');
});

svg.addEventListener('pointermove', e => {
  if (!drag) return;
  const snap = document.getElementById('ck-snap').checked ? 10 : 1;
  const sn = v => Math.round(v / snap) * snap;
  if (drag.t === 'pan') {
    const r = svg.getBoundingClientRect();
    const k = drag.vb[2] / r.width;
    svg.setAttribute('viewBox', [drag.vb[0] - (e.clientX - drag.sx) * k, drag.vb[1] - (e.clientY - drag.sy) * k, drag.vb[2], drag.vb[3]].join(' '));
    return;
  }
  const p = pt(e);
  if (drag.t === 'i') { drag.it.x = sn(p.x - drag.dx); drag.it.y = sn(p.y - drag.dy); }
  if (drag.t === 'z') {
    const pts = zonePts(drag.z);
    const dx = sn(p.x - drag.px), dy = sn(p.y - drag.py);
    drag.start.forEach((s, i) => { pts[i] = [s[0] + dx, s[1] + dy]; });
  }
  if (drag.t === 'zv') {
    zonePts(drag.z)[drag.i] = [sn(p.x), sn(p.y)];
  }
  if (drag.t === 'ir') {
    const it = drag.it;
    const a = -it.r * Math.PI / 180;
    const dx = p.x - it.x, dy = p.y - it.y;
    const lx = dx * Math.cos(a) - dy * Math.sin(a);
    const ly = dx * Math.sin(a) + dy * Math.cos(a);
    it.w = Math.max(10, sn(Math.abs(lx) * 2));
    it.h = Math.max(10, sn(Math.abs(ly) * 2));
  }
  if (drag.t === 'irot') {
    const it = drag.it;
    const deg = Math.atan2(p.y - it.y, p.x - it.x) * 180 / Math.PI + 90;
    const step = e.shiftKey ? 1 : 15;
    it.r = ((Math.round(deg / step) * step) % 360 + 360) % 360;
  }
  render();
  if (['i', 'ir', 'irot'].includes(drag.t)) showProps();
  if (['z', 'zv'].includes(drag.t)) showZProps();
});

const endDrag = () => { drag = null; svg.classList.remove('drag'); };
svg.addEventListener('pointerup', endDrag);
svg.addEventListener('pointercancel', endDrag);

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const vb = svg.getAttribute('viewBox').split(' ').map(Number);
  const r = svg.getBoundingClientRect();
  const mx = vb[0] + (e.clientX - r.left) / r.width * vb[2];
  const my = vb[1] + (e.clientY - r.top) / r.height * vb[3];
  const k = e.deltaY > 0 ? 1.12 : 1 / 1.12;
  const nw = Math.min(1400, Math.max(60, vb[2] * k));
  const nh = vb[3] * (nw / vb[2]);
  svg.setAttribute('viewBox', [mx - (mx - vb[0]) * (nw / vb[2]), my - (my - vb[1]) * (nh / vb[3]), nw, nh].join(' '));
}, { passive: false });

document.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'Escape' && mOn) { setMeasure(false); return; }
  if (!sel && zoneSel && (e.key === 'Delete' || e.key === 'Backspace')) {
    e.preventDefault(); delZone(); return;
  }
  if (!sel) return;
  const it = state.items.find(i => i.id === sel);
  if (!it) return;
  if (e.key === 'r' || e.key === 'R') { it.r = (it.r + 15) % 360; render(); showProps(); }
  if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); delItem(); }
  const step = e.shiftKey ? 1 : 10;
  if (e.key === 'ArrowLeft') { it.x -= step; render(); }
  if (e.key === 'ArrowRight') { it.x += step; render(); }
  if (e.key === 'ArrowUp') { it.y -= step; render(); }
  if (e.key === 'ArrowDown') { it.y += step; render(); }
});

function showProps() {
  const it = state.items.find(i => i.id === sel);
  if (!it) return hideProps();
  document.getElementById('props').classList.remove('hide');
  const nameBox = document.getElementById('p-name');
  if (document.activeElement !== nameBox) nameBox.value = it.name;
  document.getElementById('p-w').value = it.w;
  document.getElementById('p-h').value = it.h;
  document.getElementById('p-r').value = it.r;
  document.getElementById('p-area').textContent = `佔地 ${ping(it.w, it.h)} 坪 · ${it.w}×${it.h} cm`;
}
function hideProps() { document.getElementById('props').classList.add('hide'); }

function showZProps() {
  const z = state.zones.find(v => v.id === zoneSel);
  if (!z) return hideZProps();
  document.getElementById('zprops').classList.remove('hide');
  const nb = document.getElementById('z-name');
  if (document.activeElement !== nb) nb.value = z.name;
  const pts = zonePts(z);
  document.getElementById('z-area').textContent = '面積 ' + polyPing(pts) + ' 坪 · ' + pts.length + ' 個角';
  [...document.querySelectorAll('.zsw')].forEach(s => s.classList.toggle('on', s.dataset.fill === z.fill));
}
function hideZProps() { document.getElementById('zprops').classList.add('hide'); }
function delZone() {
  state.zones = state.zones.filter(v => v.id !== zoneSel);
  zoneSel = null; render(); hideZProps();
}
function delItem() { state.items = state.items.filter(i => i.id !== sel); sel = null; render(); hideProps(); }

['p-w', 'p-h', 'p-r'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    const it = state.items.find(i => i.id === sel); if (!it) return;
    it[id.slice(2)] = +e.target.value || 0;
    render();
    document.getElementById('p-area').textContent = `佔地 ${ping(it.w, it.h)} 坪 · ${it.w}×${it.h} cm`;
  });
});
document.getElementById('p-name').addEventListener('input', e => {
  const it = state.items.find(i => i.id === sel); if (!it) return;
  it.name = e.target.value;
  render();
});
document.getElementById('z-name').addEventListener('input', e => {
  const z = state.zones.find(v => v.id === zoneSel); if (!z) return;
  z.name = e.target.value;
  render();
});
document.getElementById('z-del').onclick = delZone;
const zcBox = document.getElementById('z-colors');
ZONES.forEach(([n, f, s]) => {
  const b = document.createElement('i');
  b.className = 'zsw'; b.dataset.fill = f;
  b.style.background = f; b.title = n;

});
document.getElementById('p-del').onclick = delItem;
document.getElementById('p-rot').onclick = () => { const it = state.items.find(i => i.id === sel); it.r = (it.r + 90) % 360; render(); showProps(); };
document.getElementById('p-dup').onclick = () => { const it = state.items.find(i => i.id === sel); const n = { ...it, id: state.seq++, x: it.x + 30, y: it.y + 30 }; state.items.push(n); sel = n.id; render(); showProps(); };

const pi = document.getElementById('pane-items');
ITEMS.forEach(([cat, color, list]) => {

});

const wc = document.createElement('div');
wc.innerHTML = '<div class="cat">預設平面圖</div>' +

pi.appendChild(wc);

const FB = { me: Math.random().toString(36).slice(2, 10), ref: null, set: null, applying: false, timer: null };

function fbStat(msg, cls) {
  const n = document.getElementById('fb-stat');
  n.textContent = msg;
  n.className = 'fbstat' + (cls ? ' ' + cls : '');
}

function pushRemote() {
  if (!FB.ref || FB.applying) return;
  clearTimeout(FB.timer);
  FB.timer = setTimeout(() => {
    FB.set(FB.ref, { by: FB.me, ts: Date.now(), state: JSON.stringify(state) })
      .catch(e => fbStat('寫入失敗：' + e.message, 'err'));
  }, 500);
}

async function fbConnect(cfgText, room) {
  let cfg;
  try { cfg = JSON.parse(cfgText); } catch (e) { return fbStat('設定 JSON 格式錯誤', 'err'); }
  if (!room) return fbStat('請填房間名稱', 'err');
  fbStat('連線中…');
  try {
    const V = 'https://www.gstatic.com/firebasejs/10.12.2/';
    const [app, auth, db] = await Promise.all([
      import(V + 'firebase-app.js'),
      import(V + 'firebase-auth.js'),
      import(V + 'firebase-database.js')
    ]);
    const a = app.initializeApp(cfg);
    await auth.signInAnonymously(auth.getAuth(a));
    const d = db.getDatabase(a);
    FB.ref = db.ref(d, 'rooms/' + room + '/live');
    FB.vref = db.ref(d, 'rooms/' + room + '/versions');
    FB.set = db.set;
    db.onValue(FB.ref, snap => {
      const v = snap.val();
      if (!v || v.by === FB.me) return;
      FB.applying = true;
      try { state = JSON.parse(v.state); sel = null; render(); hideProps(); } finally { FB.applying = false; }
      fbStat('已連線 · 房間 ' + room + ' · 剛收到更新', 'on');
    });
    db.onValue(FB.vref, snap => {
      const v = snap.val();
      if (!v) { if (versions.length) pushVersionsRemote(); return; }
      if (v.by === FB.me) return;
      try {
        versions = JSON.parse(v.data) || [];
        localStorage.setItem('mch-plan-versions', JSON.stringify(versions));
        renderVersions();
      } catch (e) {}
    });
    localStorage.setItem('mch-fb', JSON.stringify({ cfg: cfgText, room }));
    location.hash = 'room=' + encodeURIComponent(room);
    fbStat('已連線 · 房間 ' + room, 'on');
    pushRemote();
  } catch (e) {
    FB.ref = null;
    fbStat('連線失敗：' + e.message, 'err');
  }
}

function fbDisconnect() {
  FB.ref = null;
  FB.vref = null;
  clearTimeout(FB.timer);
  localStorage.removeItem('mch-fb');
  fbStat('目前：本機模式（只存在這台電腦）');
}

let versions = [];
try { versions = JSON.parse(localStorage.getItem('mch-plan-versions')) || []; } catch (e) {}

function pushVersionsRemote() {
  if (!FB.vref || !FB.set) return;
  FB.set(FB.vref, { by: FB.me, ts: Date.now(), data: JSON.stringify(versions) }).catch(() => {});
}

function persistVersions() {
  localStorage.setItem('mch-plan-versions', JSON.stringify(versions));
  pushVersionsRemote();
  renderVersions();
}

function renderVersions() {
  const box = document.getElementById('sv-list');
  if (!versions.length) { box.innerHTML = '<p class="hint">還沒有存過版本。</p>'; return; }
  box.innerHTML = '';
  [...versions].sort((a, b) => b.ts - a.ts).forEach(v => {
    const row = document.createElement('div'); row.className = 'sv';
    const dt = new Date(v.ts);
    const pad = n => String(n).padStart(2, '0');
    const nm = document.createElement('div'); nm.className = 'nm';
    nm.innerHTML = `<b></b><small>${dt.getMonth() + 1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())} · ${v.n}物件</small>`;
    nm.querySelector('b').textContent = v.name;
    const bl = document.createElement('button'); bl.textContent = '載入';
    bl.onclick = () => {
      if (!confirm('載入「' + v.name + '」？目前畫面會被覆蓋（建議先另存一版）')) return;
      state = JSON.parse(v.state); sel = null; render(); hideProps();
    };
    const br = document.createElement('button'); br.textContent = '✕'; br.className = 'rm';
    br.onclick = () => {
      if (!confirm('刪除版本「' + v.name + '」？')) return;
      versions = versions.filter(x => x.id !== v.id);
      persistVersions();
    };
    row.append(nm, bl, br);
    box.appendChild(row);
  });
}

function saveVersion() {
  const inp = document.getElementById('sv-name');
  const name = inp.value.trim() || ('版本 ' + (versions.length + 1));
  versions.push({
    id: Date.now() + '-' + FB.me,
    name, ts: Date.now(),
    n: state.items.length,
    state: JSON.stringify(state)
  });
  inp.value = '';
  persistVersions();
}

function save() {
  try { localStorage.setItem('mch-plan', JSON.stringify(state)); } catch (e) {}
  pushRemote();
}
document.getElementById('sv-add').onclick = saveVersion;
document.getElementById('sv-name').addEventListener('keydown', e => { if (e.key === 'Enter') saveVersion(); });
renderVersions();

document.getElementById('fb-go').onclick = () =>
  fbConnect(document.getElementById('fb-cfg').value, document.getElementById('fb-room').value.trim());
document.getElementById('fb-off').onclick = fbDisconnect;
document.getElementById('fb-link').onclick = () => {
  const room = document.getElementById('fb-room').value.trim();
  if (!room) return fbStat('請先填房間名稱', 'err');
  const url = location.origin + location.pathname + '#room=' + encodeURIComponent(room);
  navigator.clipboard.writeText(url).then(
    () => fbStat('連結已複製：' + url, 'on'),
    () => fbStat('連結：' + url)
  );
};

try {
  const s = localStorage.getItem('mch-plan');
  if (s) state = JSON.parse(s);
} catch (e) {}
render();

(() => {
  const hash = new URLSearchParams(location.hash.slice(1));
  const saved = JSON.parse(localStorage.getItem('mch-fb') || 'null');
  const room = hash.get('room') || (saved && saved.room) || '';
  if (room) document.getElementById('fb-room').value = room;
  if (saved && saved.cfg) {
    document.getElementById('fb-cfg').value = saved.cfg;
    if (room) fbConnect(saved.cfg, room);
  } else if (room) {
    fbStat('已帶入房間 ' + room + '，請貼上 Firebase 設定後按連線');
  }
})();
</script>

</body>
</html>
